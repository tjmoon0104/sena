<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sena Eliane Moon - Baby Card</title>
    <style>
      :root {
        --paper: #fbf7f1;
        --ink: #332621;
        --muted: #806f65;
        --line: rgba(93, 65, 50, 0.18);
        --rose: #b76f75;
        --sage: #617565;
        --blue: #536f87;
        --shadow: 0 28px 70px rgba(60, 41, 34, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 10%, rgba(183, 111, 117, 0.18), transparent 32rem),
          linear-gradient(135deg, #f5ede3 0%, #e7efe9 100%);
        color: var(--ink);
        font-family: ui-serif, Georgia, "Times New Roman", "Noto Serif CJK KR", "Noto Serif CJK JP", serif;
      }

      button,
      select,
      input {
        font: inherit;
      }

      .app {
        display: grid;
        align-content: start;
        min-height: 100vh;
        padding: 10px;
      }

      .toolbar {
        position: sticky;
        top: 14px;
        z-index: 10;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: center;
        width: min(100%, 980px);
        margin: 0 auto 8px;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.74);
        border-radius: 8px;
        background: rgba(255, 252, 247, 0.86);
        box-shadow: 0 12px 32px rgba(64, 45, 39, 0.12);
        backdrop-filter: blur(16px);
      }

      .control {
        display: grid;
        gap: 4px;
      }

      .control span {
        color: var(--muted);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .segmented {
        display: inline-flex;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffaf4;
      }

      .segmented button,
      select,
      input[type="number"],
      .print-button {
        min-height: 38px;
        border: 0;
        color: var(--ink);
        background: transparent;
        cursor: pointer;
      }

      .segmented button {
        min-width: 96px;
        padding: 0 12px;
      }

      .segmented button + button {
        border-left: 1px solid var(--line);
      }

      .segmented button.is-active,
      .print-button {
        background: var(--ink);
        color: #fffaf4;
      }

      select {
        width: 150px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffaf4;
      }

      input[type="number"] {
        width: 92px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffaf4;
      }

      .print-button {
        align-self: end;
        padding: 0 16px;
        border-radius: 8px;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 700;
      }

      .stage {
        display: grid;
        place-items: center;
        min-height: calc(100vh - 150px);
        overflow: auto;
      }

      .card {
        position: relative;
        display: grid;
        overflow: hidden;
        aspect-ratio: 10 / 14;
        width: 10cm;
        height: 14cm;
        max-width: none;
        max-height: none;
        padding: var(--portrait-margin, 2.6mm);
        --portrait-eyebrow-size: 9px;
        --portrait-title-size: 30px;
        --portrait-alt-size: 12px;
        --portrait-detail-size: 13px;
        border: 1px solid rgba(255, 255, 255, 0.78);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: var(--shadow);
      }

      .card.landscape {
        aspect-ratio: 14 / 10;
        width: 14cm;
        height: 10cm;
        padding: 10px;
      }

      .card.blush {
        --paper: #fbf4f0;
        --ink: #3d2929;
        --muted: #8d6b68;
        --accent: var(--rose);
      }

      .card.garden {
        --paper: #f6f7ef;
        --ink: #25332a;
        --muted: #6f7b6b;
        --accent: var(--sage);
      }

      .card.classic {
        --paper: #f8f4ec;
        --ink: #2a2b31;
        --muted: #6c6d74;
        --accent: var(--blue);
      }

      .portrait-layout {
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto auto;
        gap: 8px;
        height: 100%;
        min-height: 0;
      }

      .portrait-layout > * {
        min-height: 0;
      }

      .landscape .portrait-layout {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr) auto;
        align-items: stretch;
      }

      .photo-grid {
        display: grid;
        gap: 10px;
        min-height: 0;
        overflow: hidden;
      }

      .portrait-layout .photo-grid {
        grid-template-columns: 1.2fr 0.8fr;
        grid-template-rows: 1fr 1fr;
      }

      .landscape .photo-grid {
        grid-column: 1 / 3;
        grid-row: 1;
        height: 100%;
        grid-template-columns: 2fr 1fr 1fr;
        grid-template-rows: 1fr;
      }

      .photo {
        position: relative;
        overflow: hidden;
        margin: 0;
        height: 100%;
        min-height: 0;
        border-radius: 8px;
        background-color: #ddd2c9;
        background-image: var(--photo-image);
        background-position: var(--photo-position, center center);
        background-repeat: no-repeat;
        background-size: var(--photo-fit, cover);
      }

      .photo img {
        width: 100%;
        height: 100%;
        min-height: 0;
        display: block;
        opacity: 0;
      }

      .main-photo {
        grid-row: span 2;
      }

      .landscape .main-photo {
        grid-column: span 1;
        grid-row: auto;
      }

      .photo::after {
        position: absolute;
        inset: 0;
        content: "";
        border: 1px solid rgba(255, 255, 255, 0.38);
        border-radius: inherit;
        pointer-events: none;
      }

      .copy {
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 6px;
        text-align: center;
      }

      .landscape .copy {
        justify-items: start;
        text-align: left;
        align-content: end;
      }

      .eyebrow {
        color: var(--accent);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: var(--portrait-eyebrow-size);
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        justify-self: center;
        min-width: 0;
        margin: 0;
        max-width: 14ch;
        font-size: var(--portrait-title-size);
        font-weight: 500;
        line-height: 0.95;
        letter-spacing: 0;
      }

      .name-row {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 5px;
        align-items: end;
        width: 100%;
      }

      .landscape .name-row {
        grid-template-columns: 1fr;
        gap: 2px;
        justify-content: start;
        width: 100%;
      }

      .landscape h1 {
        grid-column: 1;
        grid-row: 1;
        justify-self: start;
        max-width: none;
        font-size: 28px;
        line-height: 1;
      }

      .landscape .alt-name {
        width: auto;
        font-size: 13px;
        text-align: left;
        white-space: nowrap;
      }

      .landscape .alt-name:first-child {
        grid-column: 1;
        grid-row: 2;
        justify-self: start;
      }

      .landscape .alt-name:last-child {
        grid-column: 1;
        grid-row: 3;
        justify-self: start;
      }

      .alt-name {
        width: auto;
        min-width: 0;
        margin: 0;
        color: var(--muted);
        font-size: var(--portrait-alt-size);
        line-height: 1.15;
        overflow-wrap: normal;
        white-space: nowrap;
      }

      .locale-ko .alt-name:first-child,
      .locale-ja .alt-name:first-child {
        white-space: pre-line;
      }

      .alt-name:first-child {
        justify-self: end;
        text-align: right;
      }

      .alt-name:last-child {
        justify-self: start;
        text-align: left;
      }

      .alt-name.is-hidden {
        visibility: hidden;
      }

      .details {
        display: grid;
        grid-template-columns: 1.45fr 0.75fr 0.85fr 0.8fr;
        gap: 6px;
        min-height: 0;
      }

      .landscape .details {
        grid-template-columns: 1fr;
        gap: 0;
        align-self: end;
        grid-column: 2;
        grid-row: 2;
      }

      .detail {
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 4px;
        min-width: 0;
        padding: 3px 4px;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        text-align: center;
      }

      .landscape .detail {
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 7px 4px;
      }

      .detail-label {
        color: var(--accent);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .detail-value {
        max-width: 100%;
        overflow: visible;
        font-size: var(--portrait-detail-size);
        line-height: 1.12;
        white-space: nowrap;
      }

      body.capture .toolbar {
        display: none;
      }

      body.capture .app {
        padding: 0;
      }

      body.capture .card {
        width: 10cm;
        max-height: none;
        border-radius: 0;
        box-shadow: none;
      }

      body.capture .card.landscape {
        width: 14cm;
      }

      @media (max-width: 760px) {
        .app {
          padding: 8px;
        }

        .stage {
          min-height: calc(100vh - 238px);
        }

        .toolbar {
          justify-content: stretch;
          gap: 6px;
          margin-bottom: 6px;
          padding: 6px;
        }

        .control {
          gap: 2px;
        }

        .control span {
          font-size: 9px;
        }

        .segmented button,
        select,
        .print-button {
          min-height: 32px;
          font-size: 13px;
        }

        .control,
        .print-button {
          flex: 1 1 136px;
        }

        .segmented,
        select,
        .print-button {
          width: 100%;
        }

        .segmented button {
          min-width: 0;
          flex: 1;
        }

      }

      @media print {
        @page {
          margin: 0;
          size: auto;
        }

        body {
          background: #fff;
        }

        .toolbar {
          display: none;
        }

        .app {
          min-height: auto;
          padding: 0;
        }

        .card {
          width: 10cm !important;
          height: 14cm !important;
          max-width: none;
          border: 0;
          border-radius: 0;
          box-shadow: none;
        }

        .card.landscape {
          width: 14cm !important;
          height: 10cm !important;
        }

      }
    </style>
  </head>
  <body>
    <main class="app">
      <form class="toolbar" aria-label="Card settings">
        <label class="control">
          <span>Layout</span>
          <span class="segmented">
            <button type="button" class="is-active" data-layout="portrait">Portrait</button>
            <button type="button" data-layout="landscape">Landscape</button>
          </span>
        </label>

        <label class="control" id="languageControl">
          <span>Language</span>
          <select id="language">
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="ko">Korean</option>
            <option value="ja">Japanese</option>
          </select>
        </label>

        <label class="control" id="portraitMarginControl">
          <span>Margin mm</span>
          <input id="portraitMargin" type="number" min="0" max="18" step="1" value="3" />
        </label>

        <label class="control">
          <span>Style</span>
          <select id="style">
            <option value="blush">Blush</option>
            <option value="garden">Garden</option>
            <option value="classic">Classic</option>
          </select>
        </label>

        <label class="control">
          <span>Photos</span>
          <span class="segmented">
            <button type="button" id="rotatePhotos">Rotate</button>
            <button type="button" id="shufflePhotos">Shuffle</button>
          </span>
        </label>

        <button class="print-button" type="button" id="capture">Printable mode</button>
        <button class="print-button" type="button" id="downloadImage">Download image</button>
      </form>

      <section class="stage" aria-label="Baby announcement preview">
        <article class="card blush locale-en" id="card">
          <div class="portrait-layout">
            <div class="photo-grid" aria-label="Family photos">
              <figure class="photo main-photo" style="--photo-image: url('assets/photo-1.jpeg')">
                <img src="assets/photo-1.jpeg" alt="Newborn Sena resting peacefully" />
              </figure>
              <figure class="photo" style="--photo-image: url('assets/photo-2.jpeg')">
                <img src="assets/photo-2.jpeg" alt="Sena with mother" />
              </figure>
              <figure class="photo" style="--photo-image: url('assets/photo-3.jpeg')">
                <img src="assets/photo-3.jpeg" alt="Sena with parents" />
              </figure>
            </div>

            <div class="copy">
              <div class="eyebrow" data-i18n="eyebrow">Welcome to the world, baby girl</div>
              <div class="name-row" aria-label="Names in English, French, Korean, and Japanese">
                <p class="alt-name" data-i18n="leftName">문세나</p>
                <h1 data-i18n="name">Sena Éliane Moon</h1>
                <p class="alt-name" data-i18n="rightName">駒形瀬奈</p>
              </div>
            </div>

            <div class="details">
              <div class="detail">
                <span class="detail-value" data-i18n="born">16 June 2026</span>
              </div>
              <div class="detail">
                <span class="detail-value" data-i18n="time">22:12</span>
              </div>
              <div class="detail">
                <span class="detail-value">3125g</span>
              </div>
              <div class="detail">
                <span class="detail-value">49cm</span>
              </div>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script src="assets/html2canvas.min.js"></script>
    <script>
      const content = {
        en: {
          eyebrow: "Welcome to the world, baby girl",
          name: "Sena Éliane Moon",
          leftName: "문세나",
          rightName: "駒形瀬奈",
          bornLabel: "Born",
          born: "16 June 2026",
          time: "22:12",
          weightLabel: "Weight",
          heightLabel: "Height"
        },
        fr: {
          eyebrow: "Bienvenue au monde, petite fille",
          name: "Sena Éliane Moon",
          leftName: "문세나",
          rightName: "駒形瀬奈",
          bornLabel: "Naissance",
          born: "16 juin 2026",
          time: "22:12",
          weightLabel: "Poids",
          heightLabel: "Taille"
        },
        ko: {
          eyebrow: "세상에 온 걸 환영해, 우리 딸",
          name: "문세나",
          leftName: "Sena Éliane Moon",
          rightName: "駒形瀬奈",
          bornLabel: "태어난 날",
          born: "2026년 6월 16일",
          time: "22:12",
          weightLabel: "몸무게",
          heightLabel: "키"
        },
        ja: {
          eyebrow: "ようこそ、女の子",
          name: "駒形瀬奈",
          leftName: "Sena Éliane Moon",
          rightName: "문세나",
          bornLabel: "誕生",
          born: "2026年6月16日",
          time: "22:12",
          weightLabel: "体重",
          heightLabel: "身長"
        }
      };

      const card = document.querySelector("#card");
      const language = document.querySelector("#language");
      const portraitMargin = document.querySelector("#portraitMargin");
      const portraitMarginControl = document.querySelector("#portraitMarginControl");
      const style = document.querySelector("#style");
      const capture = document.querySelector("#capture");
      const downloadImage = document.querySelector("#downloadImage");
      const layoutButtons = document.querySelectorAll("[data-layout]");
      const photoGrid = document.querySelector(".photo-grid");
      const rotatePhotos = document.querySelector("#rotatePhotos");
      const shufflePhotos = document.querySelector("#shufflePhotos");
      let photoOrder = [...photoGrid.querySelectorAll(".photo")];

      function setLanguage(locale) {
        card.classList.remove("locale-en", "locale-fr", "locale-ko", "locale-ja");
        card.classList.add(`locale-${locale}`);
        document.documentElement.lang = locale;

        document.querySelectorAll("[data-i18n]").forEach((node) => {
          node.textContent = content[locale][node.dataset.i18n];
        });
      }

      function setLayout(layout) {
        card.classList.toggle("landscape", layout === "landscape");
        portraitMarginControl.hidden = layout !== "portrait";
        layoutButtons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.layout === layout);
        });
      }

      function setPortraitMargin(value) {
        const margin = Math.min(18, Math.max(0, Number(value) || 0));
        const typeScale = Math.min(1.06, Math.max(0.73, 1 - ((margin - 3) * 0.018)));
        portraitMargin.value = margin;
        card.style.setProperty("--portrait-margin", `${margin}mm`);
        card.style.setProperty("--portrait-eyebrow-size", `${9 * typeScale}px`);
        card.style.setProperty("--portrait-title-size", `${30 * typeScale}px`);
        card.style.setProperty("--portrait-alt-size", `${12 * typeScale}px`);
        card.style.setProperty("--portrait-detail-size", `${13 * typeScale}px`);
      }

      function setStyle(theme) {
        card.classList.remove("blush", "garden", "classic");
        card.classList.add(theme);
      }

      function renderPhotos() {
        photoOrder.forEach((photo, index) => {
          photo.classList.toggle("main-photo", index === 0);
          photoGrid.append(photo);
        });
      }

      function rotatePhotoOrder() {
        photoOrder.push(photoOrder.shift());
        renderPhotos();
      }

      function shufflePhotoOrder() {
        const previousOrder = photoOrder.map((photo) => photo.querySelector("img").src).join("|");
        for (let index = photoOrder.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [photoOrder[index], photoOrder[swapIndex]] = [photoOrder[swapIndex], photoOrder[index]];
        }
        const nextOrder = photoOrder.map((photo) => photo.querySelector("img").src).join("|");
        if (nextOrder === previousOrder) {
          photoOrder.push(photoOrder.shift());
        }
        renderPhotos();
      }

      async function waitForImages(root) {
        await Promise.all([...root.querySelectorAll("img")].map((image) => {
          if (image.complete && image.naturalWidth > 0) {
            return Promise.resolve();
          }

          return new Promise((resolve, reject) => {
            image.addEventListener("load", resolve, { once: true });
            image.addEventListener("error", reject, { once: true });
          });
        }));
      }

      async function createCanvasFromElement(element) {
        if (!window.html2canvas) {
          throw new Error("html2canvas is not loaded.");
        }

        document.documentElement.dataset.downloadStatus = "waiting-for-assets";
        if (document.fonts) {
          await document.fonts.ready;
        }

        await waitForImages(element);

        document.documentElement.dataset.downloadStatus = "rendering-card";
        const canvas = await html2canvas(element, {
          backgroundColor: null,
          logging: false,
          scale: 6,
          useCORS: false
        });

        document.documentElement.dataset.downloadStatus = "drawing-original-photos";
        await drawOriginalPhotos(canvas, element);
        return canvas;
      }

      async function createCardCanvas() {
        return createCanvasFromElement(card);
      }

      function createRoundedPath(context, x, y, width, height, radius) {
        const safeRadius = Math.min(radius, width / 2, height / 2);
        context.beginPath();
        context.moveTo(x + safeRadius, y);
        context.lineTo(x + width - safeRadius, y);
        context.quadraticCurveTo(x + width, y, x + width, y + safeRadius);
        context.lineTo(x + width, y + height - safeRadius);
        context.quadraticCurveTo(x + width, y + height, x + width - safeRadius, y + height);
        context.lineTo(x + safeRadius, y + height);
        context.quadraticCurveTo(x, y + height, x, y + height - safeRadius);
        context.lineTo(x, y + safeRadius);
        context.quadraticCurveTo(x, y, x + safeRadius, y);
        context.closePath();
      }

      function parsePhotoPosition(value) {
        const parts = (value || "50% 50%").trim().split(/\s+/);
        const parsePart = (part) => {
          if (part === "left" || part === "top") return 0;
          if (part === "right" || part === "bottom") return 1;
          if (part === "center") return 0.5;
          if (part.endsWith("%")) return Math.min(1, Math.max(0, parseFloat(part) / 100));
          return 0.5;
        };
        return [parsePart(parts[0]), parsePart(parts[1] || parts[0])];
      }

      async function drawOriginalPhotos(canvas, root) {
        const context = canvas.getContext("2d");
        if (context.resetTransform) {
          context.resetTransform();
        } else {
          context.setTransform(1, 0, 0, 1, 0, 0);
        }

        const scale = canvas.width / root.getBoundingClientRect().width;
        const rootRect = root.getBoundingClientRect();

        for (const photo of [...root.querySelectorAll(".photo")]) {
          const image = photo.querySelector("img");
          const photoRect = photo.getBoundingClientRect();
          if (photoRect.width === 0 || photoRect.height === 0) {
            continue;
          }
          const x = Math.round((photoRect.left - rootRect.left) * scale);
          const y = Math.round((photoRect.top - rootRect.top) * scale);
          const width = Math.round(photoRect.width * scale);
          const height = Math.round(photoRect.height * scale);
          const radius = parseFloat(getComputedStyle(photo).borderRadius) * scale;
          const sourceWidth = image.naturalWidth;
          const sourceHeight = image.naturalHeight;
          const computedPhoto = getComputedStyle(photo);
          const photoFit = photo.dataset.fit || computedPhoto.getPropertyValue("--photo-fit").trim() || "cover";
          const [positionX, positionY] = parsePhotoPosition(computedPhoto.getPropertyValue("--photo-position"));
          const fitScale = photoFit === "contain"
            ? Math.min(width / sourceWidth, height / sourceHeight)
            : Math.max(width / sourceWidth, height / sourceHeight);
          const drawWidth = sourceWidth * fitScale;
          const drawHeight = sourceHeight * fitScale;
          const drawX = x + ((width - drawWidth) * positionX);
          const drawY = y + ((height - drawHeight) * positionY);

          context.save();
          createRoundedPath(context, x, y, width, height, radius);
          context.clip();
          context.imageSmoothingEnabled = true;
          context.imageSmoothingQuality = "high";
          context.drawImage(image, drawX, drawY, drawWidth, drawHeight);
          context.restore();

          context.save();
          createRoundedPath(context, x + 0.5, y + 0.5, width - 1, height - 1, radius);
          context.strokeStyle = "rgba(255, 255, 255, 0.38)";
          context.lineWidth = Math.max(1, scale);
          context.stroke();
          context.restore();
        }
      }

      function getDownloadFileName() {
        const locale = language.value;
        const layout = card.classList.contains("landscape") ? "landscape" : "portrait";
        return `sena-baby-card-${locale}-${layout}.png`;
      }

      async function downloadCanvas(canvas, fileName) {
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
        if (!blob) {
          throw new Error("Canvas PNG blob could not be created.");
        }

        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.download = fileName;
        link.href = url;
        document.body.append(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      async function downloadCardImage() {
        const previousLabel = downloadImage.textContent;
        downloadImage.textContent = "Preparing...";
        downloadImage.disabled = true;
        document.documentElement.dataset.downloadStatus = "starting";
        delete document.documentElement.dataset.downloadError;

        try {
          const canvas = await createCardCanvas();
          document.documentElement.dataset.downloadStatus = "creating-blob";
          document.documentElement.dataset.downloadStatus = "downloading";
          await downloadCanvas(canvas, getDownloadFileName());
          document.documentElement.dataset.downloadStatus = "done";
        } catch (error) {
          console.error(error);
          document.documentElement.dataset.downloadStatus = "error";
          document.documentElement.dataset.downloadError = error.message || String(error);
          alert("Sorry, the image could not be generated. Please try taking a screenshot in printable mode.");
        } finally {
          downloadImage.textContent = previousLabel;
          downloadImage.disabled = false;
        }
      }

      layoutButtons.forEach((button) => {
        button.addEventListener("click", () => setLayout(button.dataset.layout));
      });

      language.addEventListener("change", () => setLanguage(language.value));
      portraitMargin.addEventListener("input", () => setPortraitMargin(portraitMargin.value));
      style.addEventListener("change", () => setStyle(style.value));
      rotatePhotos.addEventListener("click", rotatePhotoOrder);
      shufflePhotos.addEventListener("click", shufflePhotoOrder);
      downloadImage.addEventListener("click", downloadCardImage);

      capture.addEventListener("click", () => {
        document.body.classList.toggle("capture");
        capture.textContent = document.body.classList.contains("capture")
          ? "Show settings"
          : "Printable mode";
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          document.body.classList.remove("capture");
          capture.textContent = "Printable mode";
        }
      });

      setLanguage(language.value);
      setStyle(style.value);
      setPortraitMargin(portraitMargin.value);
      setLayout("portrait");

      if (new URLSearchParams(window.location.search).get("download") === "1") {
        window.addEventListener("load", () => {
          setTimeout(downloadCardImage, 250);
        });
      }
    </script>
  </body>
</html>
